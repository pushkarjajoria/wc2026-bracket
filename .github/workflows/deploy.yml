name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject runtime config (PAT scoped to the data repo only)
        run: |
          cat > config.js << EOF
          window.APP_CONFIG = {
            owner: "${{ secrets.GH_OWNER }}",
            dataRepo: "${{ secrets.GH_DATA_REPO }}",
            predictionsPath: "predictions.json",
            pat: "${{ secrets.GH_PAT }}"
          };
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
